naftiko: 1.0.0-alpha2
info:
  label: Thoughtly — Contacts
  description: 'Thoughtly Contacts capability. List, create, retrieve, delete contacts and trigger AI agent calls to them.'
  tags:
    - Thoughtly
    - Contacts
    - Voice AI
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
  - namespace: env
    keys:
      THOUGHTLY_API_TOKEN: THOUGHTLY_API_TOKEN
      THOUGHTLY_TEAM_ID: THOUGHTLY_TEAM_ID
capability:
  consumes:
    - type: http
      namespace: thoughtly-contacts
      baseUri: https://api.thoughtly.com
      description: Thoughtly Contacts HTTP surface.
      resources:
        - name: contact
          path: /contact
          operations:
            - name: getContacts
              method: GET
              description: List Contacts in the workspace.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: contact-create
          path: /contact/create
          operations:
            - name: createContact
              method: POST
              description: Create a new Contact.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
        - name: contact-by-id
          path: /contact/{id}
          operations:
            - name: getContact
              method: GET
              description: Retrieve a Contact by ID.
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
            - name: deleteContact
              method: DELETE
              description: Delete a Contact by ID.
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
        - name: contact-call
          path: /contact/call
          operations:
            - name: callContact
              method: POST
              description: Trigger an Agent to call a Contact.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
      authentication:
        type: apikey
        key: x-api-token
        value: '{{env.THOUGHTLY_API_TOKEN}}'
        placement: header
